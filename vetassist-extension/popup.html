<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: Arial, sans-serif; width: 320px; padding: 10px; }
      input { width: 100%; padding: 8px; margin: 6px 0; }
      button { width: 100%; padding: 10px; cursor: pointer; }
      .msg { margin-top: 8px; font-size: 12px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <div><b>VetAssist Loader</b></div>
    <label>License key</label>
    <input id="license" placeholder="VTS-XXXX-XXXX-XXXX" />
    <label>Device ID (label)</label>
    <input id="deviceId" placeholder="PC-1" />
    <button id="save">Save</button>
    <div class="msg" id="msg"></div>

    <script src="popup.js"></script>
  </body>
</html>
