<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VetAssist Loader</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 10px; width: 320px; }
      label { display: block; margin-top: 10px; font-size: 12px; }
      input { width: 100%; padding: 8px; box-sizing: border-box; }
      button { width: 100%; margin-top: 12px; padding: 10px; cursor: pointer; }
      .hint { margin-top: 8px; font-size: 11px; opacity: 0.8; }
    </style>
  </head>
  <body>
    <label for="license_key">License key</label>
    <input id="license_key" type="text" placeholder="VTS-XXXX-XXXX-XXXX" />

    <label for="device_id">Device ID (label)</label>
    <input id="device_id" type="text" placeholder="PC-11" />

    <button id="save">Save</button>

    <div class="hint">
      Tip: ne lepi "License key ..." — samo ključ. (Iako ćemo ga mi očistiti automatski.)
    </div>

    <script src="popup.js"></script>
  </body>
</html>
